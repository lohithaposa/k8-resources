apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx
  labels:  #replicaset labels
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
  annotations:
    kubernetes.io/change-cause: "moving to 1.29"
spec:
  replicas: 2

  selector:
    matchLabels:
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
# This is pod
  template:
    metadata:
      labels:
        project: roboshop
        purpose: rs-demo
        tier: frontend
        component: frontend

    spec:
      containers:
        - name: nginx
          image: nginx:1.29 

